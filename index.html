<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Test Grader | 自動採点システム</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const quizMaster = [
            { id: 21, q: "Waterの分子量は？", ans: "18", type: "exact", pts: 10 },
            { id: 22, q: "気体ではないものは？ (1:酸素 2:窒素 3:鉄)", ans: "3", type: "exact", pts: 10 },
            { id: 23, q: "塩と砂の分離方法は？", ans: ["dissolve", "filter", "evaporate"], type: "keyword", pts: 10 },
            { id: 24, q: "pH 7の性質は？", ans: "neutral", type: "exact", pts: 10 },
            { id: 25, q: "酸性で赤くなる紙は？", ans: "litmus", type: "exact", pts: 10 },
            { id: 26, q: "鉄の錆に必要な2つは？", ans: ["water", "oxygen"], type: "keyword", pts: 10 },
            { id: 27, q: "CO2を石灰水に通すと？", ans: "milky", type: "exact", pts: 10 },
            { id: 28, q: "水素は空気より軽い？重い？", ans: "lighter", type: "exact", pts: 10 },
            { id: 29, q: "電気を通す液体は？", ans: "electrolyte", type: "exact", pts: 10 },
            { id: 30, q: "酸性なのはどれ？ (1:レモン 2:石鹸 3:重曹)", ans: "1", type: "exact", pts: 10 }
        ];

        function App() {
            const [userAnswers, setUserAnswers] = useState({});
            const [results, setResults] = useState(null);

            const handleInput = (id, val) => {
                setUserAnswers({...userAnswers, [id]: val});
            };

            const gradeTest = () => {
                let totalScore = 0;
                const feedback = quizMaster.map(item => {
                    const userVal = (userAnswers[item.id] || "").toLowerCase();
                    let isCorrect = false;

                    if (item.type === "exact") {
                        isCorrect = userVal.includes(item.ans.toLowerCase());
                    } else if (item.type === "keyword") {
                        // 全てのキーワードが含まれているか判定
                        isCorrect = item.ans.every(kw => userVal.includes(kw.toLowerCase()));
                    }

                    if (isCorrect) totalScore += item.pts;
                    return { ...item, isCorrect, userVal };
                });
                setResults({ totalScore, feedback });
            };

            return (
                <div className="max-w-3xl mx-auto py-10 px-4">
                    <div className="bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100">
                        <div className="bg-indigo-600 p-8 text-white">
                            <h1 className="text-2xl font-bold">Science Test Auto-Grader</h1>
                            <p className="opacity-80 mt-1">回答を入力して「採点する」を押してください</p>
                        </div>

                        <div className="p-8 space-y-6">
                            {quizMaster.map((m) => (
                                <div key={m.id} className="border-b border-slate-100 pb-4">
                                    <label className="block text-sm font-bold text-slate-700 mb-2">
                                        Question {m.id}: {m.q}
                                    </label>
                                    <input 
                                        type="text" 
                                        className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2 focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
                                        placeholder="回答を入力..."
                                        onChange={(e) => handleInput(m.id, e.target.value)}
                                    />
                                </div>
                            ))}

                            <button 
                                onClick={gradeTest}
                                className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-indigo-200 transition-all transform active:scale-95"
                            >
                                採点する
                            </button>
                        </div>

                        {results && (
                            <div className="p-8 bg-slate-50 border-t border-slate-100">
                                <div className="text-center mb-8">
                                    <div className="text-sm text-slate-500 font-bold uppercase tracking-widest">Total Score</div>
                                    <div className="text-6xl font-black text-indigo-600">{results.totalScore} / 100</div>
                                </div>
                                
                                <div className="space-y-3">
                                    {results.feedback.map(f => (
                                        <div key={f.id} className={`flex items-center justify-between p-4 rounded-2xl ${f.isCorrect ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>
                                            <span className="font-bold">Q{f.id}</span>
                                            <span className="text-sm font-medium">
                                                {f.isCorrect ? 'Correct! ✓' : `Incorrect (Ans: ${Array.isArray(f.ans) ? f.ans.join(", ") : f.ans})`}
                                            </span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setTimeout(() => lucide.createIcons(), 100);
    </script>
</body>
</html>
