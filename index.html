<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบตรวจข้อสอบอัตโนมัติ | AI Test Grader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap');
        body { font-family: 'Kanit', sans-serif; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const quizMaster = [
            { id: 21, q: "มวลโมเลกุลของน้ำ (H2O) คือเท่าไร?", ans: "18", type: "exact", pts: 10 },
            { id: 22, q: "ข้อใดไม่ใช่แก๊ส? (1: ออกซิเจน 2: ไนโตรเจน 3: เหล็ก)", ans: "3", type: "exact", pts: 10 },
            { id: 23, q: "จะแยกเกลือออกจากของผสมระหว่างทรายและเกลือได้อย่างไร?", ans: ["ละลาย", "กรอง", "ระเหย"], type: "keyword", pts: 10 },
            { id: 24, q: "สารละลายที่มีค่า pH 7 มีสมบัติอย่างไร?", ans: "กลาง", type: "exact", pts: 10 },
            { id: 25, q: "กระดาษชนิดใดจะเปลี่ยนเป็นสีแดงในสารละลายกรด?", ans: "ลิตมัส", type: "exact", pts: 10 },
            { id: 26, q: "ระบุ 2 สิ่งที่จำเป็นต่อการเกิดสนิมของเหล็ก", ans: ["น้ำ", "ออกซิเจน"], type: "keyword", pts: 10 },
            { id: 27, q: "จะเกิดอะไรขึ้นเมื่อผ่านแก๊สคาร์บอนไดออกไซด์ลงในน้ำปูนใส?", ans: "ขุ่น", type: "exact", pts: 10 },
            { id: 28, q: "แก๊สไฮโดรเจนเบาหรือหนักกว่าอากาศ?", ans: "เบา", type: "exact", pts: 10 },
            { id: 29, q: "สารละลายที่นำไฟฟ้าได้เรียกว่าอะไร?", ans: "อิเล็กโทรไลต์", type: "exact", pts: 10 },
            { id: 30, q: "ข้อใดมีฤทธิ์เป็นกรด? (1: น้ำมะนาว 2: สบู่ 3: ผงฟู)", ans: "1", type: "exact", pts: 10 }
        ];

        function App() {
            const [userAnswers, setUserAnswers] = useState({});
            const [results, setResults] = useState(null);

            const handleInput = (id, val) => {
                setUserAnswers({...userAnswers, [id]: val});
            };

            const gradeTest = () => {
                let totalScore = 0;
                const feedback = quizMaster.map(item => {
                    const userVal = (userAnswers[item.id] || "").trim().toLowerCase();
                    let isCorrect = false;

                    if (item.type === "exact") {
                        isCorrect = userVal.includes(item.ans.toLowerCase());
                    } else if (item.type === "keyword") {
                        isCorrect = item.ans.every(kw => userVal.includes(kw.toLowerCase()));
                    }

                    if (isCorrect) totalScore += item.pts;
                    return { ...item, isCorrect, userVal };
                });
                setResults({ totalScore, feedback });
            };

            return (
                <div className="max-w-3xl mx-auto py-10 px-4">
                    <div className="bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100">
                        <div className="bg-indigo-600 p-8 text-white">
                            <h1 className="text-2xl font-bold italic">Cpoint Science Auto-Grader</h1>
                            <p className="opacity-80 mt-1">กรุณากรอกคำตอบแล้วกดปุ่ม "ตรวจคำตอบ"</p>
                        </div>

                        <div className="p-8 space-y-6">
                            {quizMaster.map((m) => (
                                <div key={m.id} className="border-b border-slate-100 pb-4">
                                    <label className="block text-sm font-bold text-slate-700 mb-2">
                                        ข้อที่ {m.id}: {m.q}
                                    </label>
                                    <input 
                                        type="text" 
                                        className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2 focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
                                        placeholder="พิมพ์คำตอบของคุณที่นี่..."
                                        onChange={(e) => handleInput(m.id, e.target.value)}
                                    />
                                </div>
                            ))}

                            <button 
                                onClick={gradeTest}
                                className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-indigo-200 transition-all transform active:scale-95"
                            >
                                ตรวจคำตอบ (Grade)
                            </button>
                        </div>

                        {results && (
                            <div className="p-8 bg-slate-50 border-t border-slate-100 animate-in fade-in duration-500">
                                <div className="text-center mb-8">
                                    <div className="text-sm text-slate-500 font-bold uppercase tracking-widest">คะแนนรวม (Total Score)</div>
                                    <div className="text-7xl font-black text-indigo-600">{results.totalScore} / 100</div>
                                </div>
                                
                                <div className="space-y-3">
                                    {results.feedback.map(f => (
                                        <div key={f.id} className={`flex items-center justify-between p-4 rounded-2xl ${f.isCorrect ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>
                                            <span className="font-bold text-lg">Q{f.id}</span>
                                            <div className="text-right">
                                                <span className="block font-bold">
                                                    {f.isCorrect ? 'ถูกต้อง ✓' : 'ไม่ถูกต้อง ✗'}
                                                </span>
                                                {!f.isCorrect && (
                                                    <span className="text-xs opacity-70">
                                                        เฉลย: {Array.isArray(f.ans) ? f.ans.join(", ") : f.ans}
                                                    </span>
                                                )}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
